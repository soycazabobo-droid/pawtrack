<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PawTrack 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--orange:#FF6B35;--orange-light:#FF8C5A;--yellow:#FFD23F;--green:#4CAF7D;--green-dark:#3a9165;--red:#FF4757;--blue:#3b82f6;--bg:#FFF8F0;--text:#2D2D2D;--soft:#888;--shadow:0 4px 20px rgba(0,0,0,.08);--r:20px;--hh:64px;--nh:70px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.hidden{display:none!important;}
img.avatar-img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

/* SPLASH */
#splash{position:fixed;inset:0;background:linear-gradient(135deg,#FF6B35,#FFD23F);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s,transform .6s;}
#splash.out{opacity:0;transform:scale(1.05);pointer-events:none;}
.splash-inner{text-align:center;color:#fff;}
.paw-logo{font-size:72px;animation:bonce 1s infinite alternate;display:block;}
@keyframes bonce{from{transform:translateY(0)}to{transform:translateY(-14px)}}
.splash-inner h1{font-family:'Fredoka One',cursive;font-size:48px;letter-spacing:2px;margin:8px 0 4px;}
.splash-inner p{font-size:16px;opacity:.9;font-weight:600;}
.dots{margin-top:24px;display:flex;gap:8px;justify-content:center;}
.dots span{width:10px;height:10px;background:#fff;border-radius:50%;animation:dp 1s infinite;}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* AUTH */
#auth{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#FFF8F0,#FFE8D6);}
.auth-logo{font-size:56px;}.auth-title{font-family:'Fredoka One',cursive;font-size:36px;color:var(--orange);margin:4px 0;}
.auth-sub{color:var(--soft);font-weight:600;margin-bottom:28px;font-size:15px;}
.auth-box{background:#fff;border-radius:28px;padding:28px 24px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(255,107,53,.15);}
.tabs{display:flex;gap:6px;margin-bottom:22px;background:var(--bg);border-radius:14px;padding:4px;}
.tab{flex:1;padding:10px;border:none;border-radius:10px;background:none;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;cursor:pointer;color:var(--soft);transition:all .2s;}
.tab.active{background:#fff;color:var(--orange);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.fg{margin-bottom:14px;}
.fg label{display:block;font-weight:800;font-size:11px;margin-bottom:5px;color:var(--soft);text-transform:uppercase;letter-spacing:.5px;}
.fg input,.fg textarea,.fg select{width:100%;padding:11px 14px;border:2px solid #eee;border-radius:13px;font-size:15px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;transition:border .2s;background:#fff;color:var(--text);}
.fg input:focus,.fg textarea:focus{border-color:var(--orange);}
.fg textarea{resize:none;height:72px;}
.role-pick{display:flex;gap:10px;}
.rc{flex:1;padding:14px 8px;border:2px solid #eee;border-radius:16px;text-align:center;cursor:pointer;transition:all .2s;background:#fff;}
.rc.sel{border-color:var(--orange);background:#FFF3EE;}
.rc .ri{font-size:26px;display:block;margin-bottom:5px;}
.rc .rn{font-weight:800;font-size:13px;}
.rc .rd{font-size:11px;color:var(--soft);margin-top:2px;}
.btn-auth{width:100%;background:linear-gradient(135deg,var(--orange),var(--orange-light));color:#fff;border:none;border-radius:15px;padding:14px;font-size:17px;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;margin-top:6px;box-shadow:0 4px 16px rgba(255,107,53,.4);transition:transform .15s;}
.btn-auth:hover{transform:translateY(-2px);}
.btn-google{width:100%;background:#fff;color:var(--text);border:2px solid #eee;border-radius:15px;padding:11px;font-size:15px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:10px;transition:border .2s;}
.btn-google:hover{border-color:var(--orange);}
.divider{text-align:center;color:var(--soft);font-size:13px;font-weight:600;margin:12px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:#eee;}
.divider::before{left:0}.divider::after{right:0}
.err{background:#FFF0F0;color:var(--red);border-radius:12px;padding:10px 14px;font-size:13px;font-weight:700;margin-bottom:12px;display:none;}

/* APP */
#app{display:flex;flex-direction:column;min-height:100vh;}
header{position:sticky;top:0;z-index:100;height:var(--hh);background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 18px;box-shadow:0 2px 12px rgba(255,107,53,.1);}
.h-left{display:flex;align-items:center;gap:8px;}
.logo-t{font-family:'Fredoka One',cursive;font-size:24px;color:var(--orange);}
.h-right{display:flex;gap:8px;align-items:center;}
.rbadge{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#fff;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:800;}
.ibtn{background:var(--bg);border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;transition:transform .2s;}
.ibtn:hover{transform:scale(1.1);background:#ffe8dc;}
main{flex:1;padding:14px 14px calc(var(--nh)+14px);display:flex;flex-direction:column;gap:14px;}

/* CARDS */
.hero-card{background:linear-gradient(135deg,#FF6B35,#FFD23F);border-radius:var(--r);padding:18px;display:flex;align-items:center;gap:14px;color:#fff;box-shadow:0 6px 24px rgba(255,107,53,.35);position:relative;overflow:hidden;}
.hero-card::after{content:'🐾';position:absolute;right:-8px;bottom:-14px;font-size:76px;opacity:.15;}
.hc-avatar{width:62px;height:62px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0;overflow:hidden;}
.hc-info{flex:1;}
.hc-info h2{font-size:19px;font-weight:800;}
.hc-info p{font-size:13px;opacity:.85;margin-top:2px;}
.hc-badge{background:rgba(255,255,255,.25);border-radius:20px;padding:5px 11px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.dot{width:8px;height:8px;border-radius:50%;}
.dot.idle{background:#fff;}.dot.on{background:#7fff7f;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* MAP */
.map-wrap{border-radius:var(--r);overflow:hidden;height:260px;position:relative;box-shadow:var(--shadow);}
#map{height:100%;width:100%;}
.map-hud{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);border-radius:40px;padding:7px 18px;display:flex;gap:20px;box-shadow:0 4px 16px rgba(0,0,0,.15);}
.hud-s{display:flex;align-items:center;gap:5px;font-weight:800;font-size:14px;}

/* CONTROLS */
.ctrls{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;}
.btn-m{border:none;border-radius:50px;padding:13px 26px;font-size:16px;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:8px;transition:transform .15s,box-shadow .15s;}
.btn-m:active{transform:scale(.96);}
.go{background:linear-gradient(135deg,var(--green),var(--green-dark));color:#fff;box-shadow:0 5px 18px rgba(76,175,125,.45);}
.stop{background:linear-gradient(135deg,var(--red),#c0392b);color:#fff;box-shadow:0 5px 18px rgba(255,71,87,.4);}
.share-btn{background:linear-gradient(135deg,var(--blue),#1d4ed8);color:#fff;font-size:14px;padding:11px 16px;}

/* PANEL */
.panel{background:#fff;border-radius:var(--r);padding:18px;box-shadow:var(--shadow);}
.panel h3{font-size:15px;font-weight:800;margin-bottom:13px;}
.empty{text-align:center;padding:22px;color:var(--soft);}
.empty span{font-size:34px;display:block;margin-bottom:8px;}
.empty p{font-size:14px;font-weight:600;}

/* LIST ITEMS */
.li{background:var(--bg);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;margin-bottom:9px;animation:slin .3s ease;}
@keyframes slin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.li-av{width:48px;height:48px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden;border:2px solid #eee;}
.li-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.li-info{flex:1;min-width:0;}
.li-info strong{display:block;font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-info span{font-size:12px;color:var(--soft);}
.li-badge{background:#fff;border-radius:11px;padding:5px 11px;font-size:12px;font-weight:800;color:var(--orange);white-space:nowrap;}

/* WALKER CARD */
.walker-card{background:#fff;border-radius:18px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px;display:flex;align-items:center;gap:14px;cursor:pointer;border:2px solid transparent;transition:border .2s,box-shadow .2s;}
.walker-card:hover{border-color:var(--orange);box-shadow:0 6px 24px rgba(255,107,53,.2);}
.wc-photo{width:60px;height:60px;border-radius:50%;overflow:hidden;flex-shrink:0;border:3px solid var(--orange);display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--bg);}
.wc-photo img{width:100%;height:100%;object-fit:cover;}
.wc-info{flex:1;}
.wc-info h4{font-size:16px;font-weight:800;margin-bottom:2px;}
.wc-info p{font-size:12px;color:var(--soft);margin-bottom:6px;}
.wc-stars{color:#FFD23F;font-size:14px;}
.wc-desc{font-size:12px;color:var(--soft);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.btn-req{background:linear-gradient(135deg,var(--orange),var(--orange-light));color:#fff;border:none;border-radius:12px;padding:9px 16px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;}
.btn-accept{background:linear-gradient(135deg,var(--green),var(--green-dark));color:#fff;border:none;border-radius:12px;padding:8px 14px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}
.btn-reject{background:#eee;color:var(--soft);border:none;border-radius:12px;padding:8px 14px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}
.btn-watch{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:8px 14px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}
.btn-add{width:100%;background:var(--bg);border:2px dashed #FFB89A;border-radius:15px;padding:13px;font-size:15px;font-family:'Nunito',sans-serif;font-weight:700;color:var(--orange);cursor:pointer;transition:background .2s;margin-top:4px;}
.btn-add:hover{background:#FFE8D6;}
.status-pill{display:inline-block;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:800;}
.sp-pending{background:#FFF3CD;color:#856404;}
.sp-accepted{background:#D4EDDA;color:#155724;}
.sp-rejected{background:#F8D7DA;color:#721C24;}
.sp-completed{background:#D1ECF1;color:#0C5460;}

/* NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nh);background:#fff;display:flex;box-shadow:0 -4px 20px rgba(0,0,0,.07);z-index:100;}
.nbtn{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:21px;cursor:pointer;color:var(--soft);font-family:'Nunito',sans-serif;transition:color .2s,transform .2s;}
.nbtn span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.nbtn.active{color:var(--orange);transform:translateY(-2px);}

/* MODALS */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fi .2s;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.mbox{background:#fff;border-radius:28px 28px 0 0;padding:26px 22px 38px;width:100%;max-width:480px;animation:su .3s cubic-bezier(.17,.67,.4,1.2);position:relative;max-height:90vh;overflow-y:auto;}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mbox h2{font-family:'Fredoka One',cursive;font-size:21px;color:var(--orange);margin-bottom:18px;text-align:center;}
.mclose{position:absolute;top:14px;right:18px;background:var(--bg);border:none;border-radius:50%;width:34px;height:34px;font-size:15px;cursor:pointer;font-weight:800;color:var(--soft);}
.av-pick{display:flex;gap:8px;flex-wrap:wrap;}
.av-opt{font-size:28px;padding:7px;border-radius:13px;cursor:pointer;background:var(--bg);transition:transform .15s;border:2px solid transparent;}
.av-opt.sel{border-color:var(--orange);background:#ffe8dc;transform:scale(1.15);}
.btn-save{width:100%;background:linear-gradient(135deg,var(--orange),var(--orange-light));color:#fff;border:none;border-radius:15px;padding:13px;font-size:16px;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;margin-top:18px;box-shadow:0 4px 16px rgba(255,107,53,.4);}

/* SUMMARY */
.sum-stats{display:flex;gap:10px;justify-content:center;margin:18px 0;}
.ss{flex:1;background:var(--bg);border-radius:15px;padding:14px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;}
.ss span{font-size:19px;font-weight:800;}
.ss label{font-size:10px;color:var(--soft);font-weight:700;text-transform:uppercase;}
.share-box{background:var(--bg);border-radius:13px;padding:13px;margin:10px 0;word-break:break-all;font-size:12px;font-weight:700;border:2px solid #FFB89A;}
.btn-copy{background:var(--orange);color:#fff;border:none;border-radius:12px;padding:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;width:100%;margin-top:6px;}
.spinner{display:inline-block;width:16px;height:16px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
.section-title{font-size:16px;font-weight:800;margin-bottom:10px;}
.photo-preview{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--orange);margin:0 auto 10px;display:block;}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-inner">
    <div class="paw-logo">🐾</div>
    <h1>PawTrack</h1>
    <p>Conecta dueños y paseadores</p>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- AUTH -->
<div id="auth" class="hidden">
  <div class="auth-logo">🐾</div>
  <h1 class="auth-title">PawTrack</h1>
  <p class="auth-sub">Conecta dueños y paseadores</p>
  <div class="auth-box">
    <div class="tabs">
      <button class="tab active" id="tab-in" onclick="switchTab('in')">Iniciar sesión</button>
      <button class="tab" id="tab-up" onclick="switchTab('up')">Registrarse</button>
    </div>
    <div id="auth-err" class="err"></div>

    <!-- LOGIN -->
    <div id="f-in">
      <div class="fg"><label>Email</label><input type="email" id="li-email" placeholder="tu@email.com"/></div>
      <div class="fg"><label>Contraseña</label><input type="password" id="li-pass" placeholder="••••••••"/></div>
      <button class="btn-auth" id="btn-li" onclick="doLogin()">Entrar 🐾</button>
      <div class="divider">o</div>
      <button class="btn-google" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
        Continuar con Google
      </button>
    </div>

    <!-- REGISTER -->
    <div id="f-up" class="hidden">
      <div class="fg"><label>¿Eres dueño o paseador?</label>
        <div class="role-pick">
          <div class="rc sel" id="rc-owner" onclick="selRole('owner')"><span class="ri">🏠</span><div class="rn">Dueño</div><div class="rd">Busco paseadores</div></div>
          <div class="rc" id="rc-walker" onclick="selRole('walker')"><span class="ri">🦮</span><div class="rn">Paseador</div><div class="rd">Ofrezco paseos</div></div>
        </div>
      </div>
      <div class="fg"><label>Nombre completo</label><input type="text" id="ru-name" placeholder="Ej: María García"/></div>
      <div class="fg"><label>Email</label><input type="email" id="ru-email" placeholder="tu@email.com"/></div>
      <div class="fg"><label>Contraseña</label><input type="password" id="ru-pass" placeholder="Mínimo 6 caracteres"/></div>
      <div class="fg"><label>URL de tu foto de perfil</label><input type="url" id="ru-photo" placeholder="https://i.imgur.com/tu-foto.jpg"/></div>
      <div id="ru-walker-fields" class="hidden">
        <div class="fg"><label>Descripción (¿por qué eres buen paseador?)</label><textarea id="ru-desc" placeholder="Ej: Amo los perros, tengo 3 años de experiencia..."></textarea></div>
        <div class="fg"><label>Teléfono / WhatsApp</label><input type="text" id="ru-phone" placeholder="+51 999 999 999"/></div>
      </div>
      <button class="btn-auth" id="btn-up" onclick="doRegister()">Crear cuenta 🐾</button>
      <div class="divider">o</div>
      <button class="btn-google" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
        Continuar con Google
      </button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header>
    <div class="h-left"><span style="font-size:26px">🐾</span><span class="logo-t">PawTrack</span></div>
    <div class="h-right">
      <span class="rbadge" id="h-role">🏠 Dueño</span>
      <button class="ibtn" onclick="doLogout()">🚪</button>
    </div>
  </header>
  <main id="main"></main>
  <nav class="bnav">
    <button class="nbtn active" data-p="home" onclick="go('home')">🏠<span>Inicio</span></button>
    <button class="nbtn" data-p="walkers" onclick="go('walkers')" id="nav-walkers">🦮<span>Paseadores</span></button>
    <button class="nbtn" data-p="requests" onclick="go('requests')">📋<span>Solicitudes</span></button>
    <button class="nbtn" data-p="profile" onclick="go('profile')">👤<span>Perfil</span></button>
  </nav>
</div>

<!-- MODAL AGREGAR PERRO -->
<div id="m-dog" class="modal hidden">
  <div class="mbox">
    <button class="mclose" onclick="cm('m-dog')">✕</button>
    <h2>🐶 Mi Perro</h2>
    <div class="fg"><label>Nombre</label><input type="text" id="d-name" placeholder="Ej: Luna, Max..."/></div>
    <div class="fg"><label>Raza</label><input type="text" id="d-breed" placeholder="Ej: Labrador, Mestizo..."/></div>
    <div class="fg"><label>Edad (años)</label><input type="number" id="d-age" placeholder="3" min="0" max="20"/></div>
    <div class="fg"><label>URL de foto del perro</label><input type="url" id="d-photo" placeholder="https://i.imgur.com/foto-perro.jpg"/></div>
    <div class="fg"><label>Avatar (si no tienes foto)</label>
      <div class="av-pick" id="av-dog">
        <span class="av-opt sel" data-e="🐕">🐕</span><span class="av-opt" data-e="🐩">🐩</span>
        <span class="av-opt" data-e="🦮">🦮</span><span class="av-opt" data-e="🐶">🐶</span>

function hav(a,b){const R=6371,dLa=(b.lat-a.lat)*Math.PI/180,dLo=(b.lng-a.lng)*Math.PI/180,h=Math.sin(dLa/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLo/2)**2;return R*2*Math.atan2(Math.sqrt(h),Math.sqrt(1-h));}
function fmtT(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);return h>0?`${h}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}

async function watchWalk(wId){
  const m=$('main');
  m.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <button onclick="go('home')" style="background:var(--bg);border:none;border-radius:12px;padding:8px 14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif">← Volver</button>
      <span style="font-weight:800;color:var(--orange)">📡 Paseo en vivo</span>
    </div>
    <div class="map-wrap" style="height:420px"><div id="map"></div></div>`;
  setTimeout(async()=>{
    initMap();
    const {data:gps}=await sb.from('gps_points').select('*').eq('walk_id',wId).order('recorded_at');
    if(gps&&gps.length){
      const lls=gps.map(p=>[p.lat,p.lng]);
      routeLine.setLatLngs(lls);
      map.fitBounds(lls);
      const last=gps[gps.length-1];
      uMarker=L.marker([last.lat,last.lng],{icon:dogIcon()}).addTo(map);
    }
    if(rtCh) rtCh.unsubscribe();
    rtCh=sb.channel('walk-'+wId).on('postgres_changes',{event:'INSERT',schema:'public',table:'gps_points',filter:`walk_id=eq.${wId}`},({new:p})=>{
      routeLine.addLatLng([p.lat,p.lng]); map.panTo([p.lat,p.lng]);
      if(uMarker) uMarker.setLatLng([p.lat,p.lng]); else uMarker=L.marker([p.lat,p.lng],{icon:dogIcon()}).addTo(map);
    }).subscribe();
  },300);
}

// ==========================================
//   MAP & WALK (walker GPS)
// ==========================================
function initMap(lat=-12.046,lng=-77.043){
  if(map){map.remove();map=null;uMarker=null;}
  const el=$('map'); if(!el) return;
  map=L.map('map',{zoomControl:false}).setView([lat,lng],15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:19}).addTo(map);
  L.control.zoom({position:'topright'}).addTo(map);
  routeLine=L.polyline([],{color:'#FF6B35',weight:5,opacity:.85}).addTo(map);
  if(navigator.geolocation) navigator.geolocation.getCurrentPosition(p=>map.setView([p.coords.latitude,p.coords.longitude],15),()=>{});
}
function dogIcon(){
  const av=dogs[0]?.avatar||'🐕';
  return L.divIcon({html:`<div style="font-size:26px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3))">${av}</div>`,iconSize:[34,34],iconAnchor:[17,17],className:''});
}

function resumeWalk(){
  if(!navigator.geolocation||!walkId) return;
  pts=[]; dist=0; t0=Date.now();
  tmrId=setInterval(()=>{const e=$('s-time');if(e)e.textContent=fmtT(Date.now()-t0);},1000);
  gpsId=navigator.geolocation.watchPosition(async pos=>{
    const {latitude:lat,longitude:lng}=pos.coords;
    const pt={lat,lng};
    if(pts.length>0) dist+=hav(pts[pts.length-1],pt);
    pts.push(pt);
    const ed=$('s-dist'); if(ed) ed.textContent=dist.toFixed(2)+' km';
    if(routeLine) routeLine.addLatLng([lat,lng]);
    if(map) map.panTo([lat,lng]);
    if(uMarker) uMarker.setLatLng([lat,lng]); else uMarker=L.marker([lat,lng],{icon:dogIcon()}).addTo(map);
    if(walkId) await sb.from('gps_points').insert({walk_id:walkId,lat,lng});
  },err=>{if(err.code===1)alert('Activa el GPS 📍');},{enableHighAccuracy:true,maximumAge:3000,timeout:10000});
}

async function stopWalk(){
  tracking=false;
  if(gpsId!==null){navigator.geolocation.clearWatch(gpsId);gpsId=null;}
  clearInterval(tmrId);
  const dur=Date.now()-t0;
  if(walkId) await sb.from('walks').update({status:'completed',ended_at:new Date().toISOString(),distance:dist}).eq('id',walkId);
  $('s-dist').textContent=dist.toFixed(2)+' km';
  $('s-time').textContent=fmtT(dur);
  $('s-pts').textContent=pts.length;
  om('m-sum');
  walkId=null;
}

function showShare(){
  if(!walkId) return;
  const link=`${location.origin}${location.pathname}?watch=${walkId}`;
  $('share-txt').textContent=link;
  om('m-share');
}
function copyLink(){navigator.clipboard.writeText($('share-txt').textContent).then(()=>alert('¡Copiado! 📋'));}

// ==========================================
//   DOGS
// ==========================================
async function getDogs(){
  const {data}=await sb.from('dogs').select('*').eq('owner_id',CU.id);
  dogs=data||[]; return dogs;
}
function renderDogsList(dogsArr){
  const el=$('dogs-list'); if(!el) return;
  el.innerHTML=dogsArr.map(d=>`
    <div class="li">
      <div class="li-av">${d.photo_url?`<img src="${d.photo_url}">`:`<span>${d.avatar||'🐕'}</span>`}</div>
      <div class="li-info"><strong>${d.name}</strong><span>${d.breed||'Sin raza'}${d.age?' · '+d.age+' años':''}</span></div>
    </div>`).join('')||'';
}
async function saveDog(){
  const name=$('d-name').value.trim(), breed=$('d-breed').value.trim();
  const age=parseInt($('d-age').value)||null, photo=$('d-photo').value.trim();
  if(!name) return alert('Escribe el nombre del perro');
  await sb.from('dogs').insert({owner_id:CU.id,name,breed,age,photo_url:photo||null,avatar:dogAv});
  cm('m-dog');
  const d=await getDogs(); renderDogsList(d);
  go('home');
}

// avatar picker dog
$('av-dog').addEventListener('click',e=>{
  const o=e.target.closest('.av-opt'); if(!o) return;
  document.querySelectorAll('#av-dog .av-opt').forEach(x=>x.classList.remove('sel'));
  o.classList.add('sel'); dogAv=o.dataset.e;
});

// ==========================================
//   BOOTSTRAP
// ==========================================
window.addEventListener('DOMContentLoaded',async()=>{
  const watchParam=new URLSearchParams(location.search).get('watch');
  setTimeout(async()=>{
    const splash=$('splash');
    splash.classList.add('out');
    setTimeout(async()=>{
      splash.style.display='none';
      const {data:{session}}=await sb.auth.getSession();
      if(session){await initApp(session.user);if(watchParam)watchWalk(watchParam);}
      else om('auth');
    },600);
  },2200);

  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session){await initApp(session.user);}
    else if(event==='SIGNED_OUT'){$('app').classList.add('hidden');om('auth');}
  });
});
</script>
